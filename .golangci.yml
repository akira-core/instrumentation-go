# golangci-lint v2 — reference: Prometheus, maratori/golangci-lint-config
# https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  go: '1.24'

issues:
  max-same-issues: 0
  max-issues-per-linter: 0

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - prealloc
    - revive
    - gosec
    - errorlint
    - exptostd
    - perfsprint
    - predeclared
    - usestdlibvars
    - whitespace
    - testifylint
  settings:
    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
    gosec:
      excludes:
        - G304  # file path from variable (e.g. config) — allow where appropriate
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/akira-core/instrumentation-go
