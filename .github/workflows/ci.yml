# CI: unit tests and golangci-lint for all Go modules in this repo.
name: CI

on:
  push:
    branches: [main, master, "feat/*"]
  pull_request:
    branches: [main, master, "feat/*"]

permissions:
  contents: read

jobs:
  test-and-lint:
    name: Go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - otel-mongo
          - otel-mongo/v2
          - otel-nats
          - otel-gorilla-ws
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: false

      - name: Build
        run: go build ./...
        working-directory: ${{ matrix.module }}

      - name: Test
        run: go test -v -race ./...
        working-directory: ${{ matrix.module }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: ${{ matrix.module }}

      - name: Verify direct/ has no OTel SDK imports
        # Enforces the otel-mongo disabled-mode invariant: internal/direct/
        # packages must never import go.opentelemetry.io/otel/* so the
        # compiler can prove no SDK code path is reachable when tracing is off.
        # See otel-mongo/STRATEGY_REFACTOR_PLAN.html §8.
        if: matrix.module == 'otel-mongo' || matrix.module == 'otel-mongo/v2'
        run: |
          if [ -d "internal/direct" ]; then
            if grep -rE '"go\.opentelemetry\.io/otel' internal/direct; then
              echo "::error::internal/direct/ must not import go.opentelemetry.io/otel/* — see STRATEGY_REFACTOR_PLAN §8"
              exit 1
            fi
            echo "OK: internal/direct/ has zero OTel SDK imports"
          fi
        working-directory: ${{ matrix.module }}

  integration-test:
    name: Integration (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: test-and-lint
    strategy:
      fail-fast: false
      matrix:
        module:
          - otel-nats/tests/integration
          - otel-mongo/tests/integration
          - otel-mongo/v2/tests/integration
          - otel-gorilla-ws/tests/integration
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: false

      - name: Integration Tests
        run: go test -v -race -timeout 120s ./...
        working-directory: ${{ matrix.module }}
