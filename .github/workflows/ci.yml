# CI: unit tests and golangci-lint for all Go modules in this repo.
name: CI

on:
  push:
    branches: [main, master, "feat/*"]
  pull_request:
    branches: [main, master, "feat/*"]

permissions:
  contents: read

jobs:
  test-and-lint:
    name: Go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - otel-sampler
          - otel-testkit
          - otel-mongo
          - otel-mongo/v2
          - otel-nats
          - otel-gorilla-ws
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Build
        run: go build ./...
        working-directory: ${{ matrix.module }}

      - name: Test
        run: go test -v -race ./...
        working-directory: ${{ matrix.module }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: ${{ matrix.module }}

      - name: Verify direct/ has no OTel SDK imports
        # Enforces the otel-mongo disabled-mode invariant: internal/direct/
        # packages must never import go.opentelemetry.io/otel/* so the
        # compiler can prove no SDK code path is reachable when tracing is off.
        if: matrix.module == 'otel-mongo' || matrix.module == 'otel-mongo/v2'
        run: |
          if [ -d "internal/direct" ]; then
            if grep -rE '"go\.opentelemetry\.io/otel' internal/direct; then
              echo "::error::internal/direct/ must not import go.opentelemetry.io/otel/*"
              exit 1
            fi
            echo "OK: internal/direct/ has zero OTel SDK imports"
          fi
        working-directory: ${{ matrix.module }}

  integration-test:
    name: Integration (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: test-and-lint
    strategy:
      fail-fast: false
      matrix:
        module:
          - otel-nats/tests/integration
          - otel-mongo/tests/integration
          - otel-mongo/v2/tests/integration
          - otel-gorilla-ws/tests/integration
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Integration Tests
        run: go test -v -race -timeout 300s ./...
        working-directory: ${{ matrix.module }}

  sampling-e2e:
    name: Sampling E2E (${{ matrix.row.name }})
    runs-on: ubuntu-latest
    needs: test-and-lint
    strategy:
      fail-fast: false
      matrix:
        row:
          - { name: all-on,            global: "1", mongo: "1", prop: "1", arg: "1.0" }
          - { name: all-on-half,       global: "1", mongo: "1", prop: "1", arg: "0.5" }
          - { name: propagation-off,   global: "1", mongo: "1", prop: "0", arg: "1.0" }
          - { name: mongo-tracing-off, global: "1", mongo: "0", prop: "1", arg: "1.0" }
          - { name: global-off,        global: "0", mongo: "1", prop: "1", arg: "1.0" }
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Consistent-sampling E2E
        working-directory: otel-mongo/v2/tests/integration
        env:
          OTEL_INSTRUMENTATION_GO_TRACING_ENABLED: ${{ matrix.row.global }}
          OTEL_MONGO_TRACING_ENABLED: ${{ matrix.row.mongo }}
          OTEL_MONGO_PROPAGATION_ENABLED: ${{ matrix.row.prop }}
          OTEL_TRACES_SAMPLER_ARG: ${{ matrix.row.arg }}
        run: go test -race -timeout 600s -run TestMongo ./sampling/

  http-direct-e2e:
    name: Sampling E2E (http-direct)
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Black-box (HTTP) consistent-sampling E2E
        working-directory: otel-testkit/examples/httpdirect
        run: go test -race -timeout 600s -run TestHTTP ./...
